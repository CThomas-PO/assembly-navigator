<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assembly Navigator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 12px;
  color: #111;
  background: #d8d8d8;
  display: flex;
}

/* ── 3D Viewer ── */
.viewer-area {
  flex: 1; min-width: 0;
  position: relative; overflow: hidden;
  background: #efefef;
}
#canvas-3d { width: 100%; height: 100%; display: block; }
#viewer-hint {
  position: absolute; bottom: 8px; left: 0; right: 0;
  text-align: center; font-size: 10px; color: #999;
  pointer-events: none; user-select: none;
}

/* ── Panel ── */
.panel {
  width: 350px; min-width: 260px; max-width: 80vw;
  height: 100%; display: flex; flex-direction: column;
  background: #fff;
  border-left: 2px solid #aaa;
  position: relative; flex-shrink: 0; overflow: hidden;
  order: 1;
}

/* ── Drag-resize handle ── */
.resize-handle {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; cursor: col-resize; z-index: 50;
}
.resize-handle::after {
  content: ''; position: absolute;
  left: 1px; top: 0; bottom: 0; width: 2px;
  background: transparent; transition: background 0.15s;
}
.resize-handle:hover::after,
.resize-handle.active::after { background: #555; }

/* ── Panel title ── */
.pnl-title {
  background: #e4e4e4;
  border-bottom: 1px solid #bbb;
  padding: 5px 8px 5px 10px;
  font-size: 11px; font-weight: bold;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: #444; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}

/* ── Assembly root row ── */
tr.asm-root td {
  font-weight: bold;
  color: #111;
}

/* ── Panel header ── */
.pnl-header {
  background: #f0f0f0;
  border-bottom: 1px solid #bbb;
  padding: 6px 8px;
  display: flex; align-items: center; gap: 7px;
  flex-shrink: 0; min-width: 0;
}
.prod-icon {
  width: 22px; height: 22px; flex-shrink: 0;
  border: 1px solid #aaa; background: #e4e4e4;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #555;
}
.prod-text { flex: 1; min-width: 0; overflow: hidden; }
.prod-name {
  font-size: 12px; font-weight: bold;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;
}
.prod-chips { display: flex; gap: 3px; margin-top: 2px; flex-wrap: nowrap; overflow: hidden; }
.chip {
  border: 1px solid #bbb; background: #fff;
  padding: 0 4px; font-size: 9px; color: #666;
  white-space: nowrap; flex-shrink: 0;
}
.hdr-btn {
  width: 20px; height: 20px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: #fff; border: 1px solid #bbb;
  cursor: pointer; color: #555; font-size: 12px;
  line-height: 1; font-family: 'Segoe UI', Arial, sans-serif;
}
.hdr-btn:hover { background: #e4e4e4; border-color: #888; }
.hdr-btn.on { background: #e4e4e4; border-color: #555; font-weight: bold; color: #111; }

/* ── Toolbar ── */
.toolbar {
  background: #f8f8f8; border-bottom: 1px solid #ccc;
  padding: 5px 7px; display: flex; flex-direction: column;
  gap: 4px; flex-shrink: 0;
}
.tb-row { display: flex; gap: 4px; align-items: center; }

.search-input {
  background: #fff; border: 1px solid #bbb;
  color: #111; padding: 3px 6px;
  font-size: 11px; outline: none; font-family: 'Segoe UI', Arial, sans-serif;
  min-width: 0;
}
.search-input:focus { border-color: #666; }
.search-input::placeholder { color: #bbb; }

.tb-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 3px;
  background: #fff; border: 1px solid #bbb;
  color: #333; padding: 3px 7px;
  font-size: 11px; cursor: pointer;
  white-space: nowrap; user-select: none; flex-shrink: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
}
.tb-btn:hover { background: #ebebeb; border-color: #888; }
.tb-btn.active { background: #ddd; border-color: #666; color: #111; font-weight: bold; }
.tb-btn.sq { padding: 3px 6px; }

/* ── Pre-filter dropdown ── */
.pflt-wrap { position: relative; flex-shrink: 0; }
.pflt-panel {
  display: none;
  position: absolute; top: calc(100% + 3px); left: 0;
  background: #fff; border: 1px solid #aaa;
  min-width: 200px; z-index: 300;
  box-shadow: 2px 3px 6px rgba(0,0,0,0.15);
}
.pflt-panel.open { display: block; }
.pflt-hd {
  padding: 4px 8px;
  font-size: 10px; font-weight: bold; color: #666;
  border-bottom: 1px solid #ddd; margin-bottom: 2px;
  text-transform: uppercase; letter-spacing: 0.4px;
}
.pflt-opt {
  display: flex; align-items: baseline; gap: 8px;
  padding: 5px 10px; cursor: pointer;
}
.pflt-opt:hover { background: #f0f0f0; }
.pflt-key  { font-family: 'Courier New', monospace; font-size: 11px; font-weight: bold; color: #222; }
.pflt-desc { font-size: 10px; color: #888; }

/* ── Column chooser modal ── */
.col-wrap { position: relative; }
#col-modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 500;
  display: flex; align-items: center; justify-content: center;
}
#col-modal {
  background: #fff; border: 1px solid #999;
  box-shadow: 4px 8px 28px rgba(0,0,0,0.22);
  width: 460px; font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 12px;
}
.col-modal-title {
  background: #e4e4e4; border-bottom: 1px solid #bbb;
  padding: 7px 12px;
  font-size: 11px; font-weight: bold;
  text-transform: uppercase; letter-spacing: 0.5px; color: #444;
  display: flex; align-items: center; justify-content: space-between;
}
.col-modal-close {
  background: none; border: none; cursor: pointer;
  color: #666; font-size: 15px; line-height: 1;
  font-family: inherit; padding: 0;
}
.col-modal-close:hover { color: #111; }
.col-modal-body {
  padding: 14px 16px;
  display: flex; gap: 10px; align-items: stretch;
}
.col-list-section {
  flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0;
}
.col-list-section > span {
  font-size: 10px; font-weight: bold; color: #666;
  text-transform: uppercase; letter-spacing: 0.3px;
}
.col-list-section select {
  flex: 1; height: 170px;
  border: 1px solid #bbb; background: #fff;
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 12px; color: #222;
  padding: 2px; outline: none;
}
.col-list-section select:focus { border-color: #777; }
.col-modal-arrows {
  display: flex; flex-direction: column;
  justify-content: center; gap: 6px; flex-shrink: 0; padding-top: 18px;
}
.col-modal-footer {
  border-top: 1px solid #ddd; padding: 8px 16px;
  display: flex; justify-content: flex-end; gap: 6px;
}

/* ── Stats bar ── */
.stats-bar {
  background: #f8f8f8; border-bottom: 1px solid #e0e0e0;
  padding: 3px 8px;
  font-size: 10px; color: #777;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0; overflow: hidden;
}
.sv { font-weight: bold; color: #222; }
.fbadge {
  margin-left: auto;
  display: flex; align-items: center; gap: 3px;
  border: 1px solid #aaa; background: #e8e8e8;
  color: #333; padding: 1px 5px;
  font-size: 10px; flex-shrink: 0; white-space: nowrap;
}
.fbadge .x { cursor: pointer; color: #666; font-size: 11px; line-height: 1; }
.fbadge .x:hover { color: #111; }

/* ── Table ── */
.table-wrap { flex: 1; overflow: auto; background: #fff; }
table { width: 100%; border-collapse: collapse; table-layout: fixed; }
thead { position: sticky; top: 0; z-index: 10; }
th {
  background: #f0f0f0;
  border-bottom: 2px solid #aaa;
  border-right: 1px solid #ddd;
  padding: 5px 7px;
  text-align: left; font-size: 10px; font-weight: bold;
  color: #555; text-transform: uppercase; letter-spacing: 0.3px;
  white-space: nowrap; user-select: none;
  overflow: hidden; text-overflow: ellipsis;
}
th:last-child { border-right: none; }
th[draggable] { cursor: grab; }
th[draggable]:active { cursor: grabbing; }
th.col-dragging { opacity: 0.35; }
th.drop-before { border-left:  2px solid #333 !important; }
th.drop-after  { border-right: 2px solid #333 !important; }
th.col-name { width: auto; }
th.col-id   { width: 112px; }
th.col-qty  { width: 38px; text-align: center; }
th.col-mat  { width: 138px; }
th.col-geo  { width: 118px; }
th.col-spec { width: 130px; }
th.col-desc { width: 150px; }

tbody tr { border-bottom: 1px solid #efefef; cursor: default; }
tbody tr:nth-child(even) { background: #fafafa; }
tbody tr:hover    { background: #f0f0f0; }
tbody tr.hovered  { background: #e8eef8 !important; }
tbody tr.selected { background: #ddd; }

td {
  padding: 4px 7px;
  border-right: 1px solid #efefef;
  vertical-align: middle; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; max-width: 0;
  color: #222;
}
td:last-child { border-right: none; }
td.col-qty { text-align: center; }

/* ── Tree cell ── */
.tree-cell { display: flex; align-items: center; overflow: hidden; }
.indent { flex-shrink: 0; }
.xbtn {
  width: 14px; height: 14px; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; color: #666; font-size: 9px; line-height: 1;
}
.xbtn:hover { color: #000; }
.xbtn.leaf { cursor: default; color: #ccc; pointer-events: none; }
.lbl { margin-left: 4px; overflow: hidden; text-overflow: ellipsis; font-size: 12px; color: #333; }
.lbl.p { font-weight: bold; color: #111; }

/* ── Cell text ── */
.id-code  { font-family: 'Courier New', monospace; font-size: 10px; color: #555; }
.qty-pill { font-size: 11px; font-weight: bold; color: #333; }
.mat-tag  { font-size: 11px; color: #333; }
.geo-tag  { font-family: 'Courier New', monospace; font-size: 10px; color: #555; }
.spec-text{ font-family: 'Courier New', monospace; font-size: 10px; color: #444; }
.nil      { color: #ccc; }

/* ── 3D context menu ── */
#ctx-menu {
  display: none;
  position: fixed;
  background: #fff;
  border: 1px solid #aaa;
  box-shadow: 2px 3px 6px rgba(0,0,0,0.15);
  z-index: 1000;
  min-width: 150px;
  padding: 3px 0;
}
.ctx-item {
  padding: 6px 14px;
  font-size: 12px;
  color: #222;
  cursor: pointer;
  white-space: nowrap;
  font-family: 'Segoe UI', Arial, sans-serif;
}
.ctx-item:hover { background: #f0f0f0; }

/* ── Empty state ── */
.empty-state {
  margin: 20px; padding: 32px 20px;
  border: 2px dashed #ccc;
  text-align: center; color: #999;
}
.empty-state h3 { font-size: 12px; margin-bottom: 4px; }
.empty-state p  { font-size: 11px; color: #bbb; }
</style>

  "imports": {

  }
}
</script>

<!-- ── Assembly Navigator Panel ─────────────────────────────────────────── -->
<div class="panel" id="panel">
  <div class="resize-handle" id="rhandle"></div>

  <div class="pnl-title">
    Assembly Navigator
    <button class="hdr-btn" id="btn-widen" title="Expand panel">
      <span id="widen-icon">&raquo;</span>
    </button>
  </div>

  <div class="pnl-header" style="display:none">
    <div class="prod-text">
      <span class="prod-name" id="hdr-name">Loading…</span>
      <div class="prod-chips" id="hdr-chips"></div>
    </div>
  </div>

  <div class="toolbar">
    <!-- row 1: filter input -->
    <div class="tb-row">
      <div class="pflt-wrap" id="pflt-wrap">
        <button class="tb-btn sq" id="btn-pflt" title="Filter by field">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
            <path d="M1 1.5h9L6.5 5v4.5l-2-1V5L1 1.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="pflt-panel" id="pflt-panel">
          <div class="pflt-hd">Filter by field</div>
          <div class="pflt-opt" data-prefix=":material ">
            <span class="pflt-key">:material</span>
            <span class="pflt-desc">filter by material type</span>
          </div>
          <div class="pflt-opt" data-prefix=":geometry ">
            <span class="pflt-key">:geometry</span>
            <span class="pflt-desc">filter by geometry type</span>
          </div>
        </div>
      </div>
      <input class="search-input" id="inp-search" placeholder="Filter" autocomplete="off" style="flex:1">
      <button class="tb-btn sq" id="btn-clear-search" title="Clear filter" style="display:none">&#x2715;</button>
      <div class="col-wrap">
        <button class="tb-btn sq" id="btn-cols" title="Configure columns">Cols</button>
      </div>
    </div>

    <!-- row 2: tree expand/collapse (hidden) -->
    <div class="tb-row" id="row-expand-collapse" style="display:none">
      <button class="tb-btn" id="btn-expand"  style="flex:1">&#9660; Expand All</button>
      <button class="tb-btn" id="btn-collapse" style="flex:1">&#9650; Collapse All</button>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar" style="display:none"></div>

  <div class="table-wrap">
    <table id="nav-table">
      <thead><tr id="thead-row"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty-state" id="empty-state" style="display:none">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"
           style="display:block;margin:0 auto;opacity:0.2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <h3>No results</h3>
      <p>Adjust search or filters</p>
    </div>
  </div>
</div>

<!-- ── Column chooser modal ──────────────────────────────────────────────────── -->
<div id="col-modal-backdrop" style="display:none">
  <div id="col-modal">
    <div class="col-modal-title">
      Configure Columns
      <button class="col-modal-close" id="col-modal-x">&#x2715;</button>
    </div>
    <div class="col-modal-body">
      <div class="col-list-section">
        <span>Shown</span>
        <select id="col-list-chosen" multiple></select>
      </div>
      <div class="col-modal-arrows">
        <button class="tb-btn" id="col-move-left" title="Add to shown">&#8592;</button>
        <button class="tb-btn" id="col-move-right" title="Remove from shown">&#8594;</button>
      </div>
      <div class="col-list-section">
        <span>Available</span>
        <select id="col-list-avail" multiple></select>
      </div>
    </div>
    <div class="col-modal-footer">
      <button class="tb-btn" id="col-modal-apply">Apply</button>
      <button class="tb-btn" id="col-modal-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- ── 3D context menu ───────────────────────────────────────────────────────── -->
<div id="ctx-menu">
  <div class="ctx-item" id="ctx-scroll">Scroll to item</div>
</div>

<!-- ── 3D Viewer ──────────────────────────────────────────────────────────── -->
<div class="viewer-area">
  <canvas id="canvas-3d"></canvas>
  <div id="viewer-hint">Drag to orbit &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Select a part in the navigator to highlight it</div>
</div>

let allNodes   = [];
let search     = '';
let selectedId = null;

const WIDE_WIDTH    = 640;
const DEFAULT_WIDTH = 350;
let isWide = false;

// ─── Build flat node list ─────────────────────────────────────────────────────
function buildNodes(comps, depth = 0, parentId = null) {
  const list = [];
  for (const c of comps) {
    list.push({
      id:       c.id,
      name:     c.name,
      qty:      c.quantity ?? 1,
      mat:      c.material      || '',
      geo:      c.geometry?.type || '',
      spec:     c.specification  || '',
      desc:     c.description    || '',
      depth, parentId,
      hasKids:  !!(c.sub_components?.length),
      expanded: true,
    });
    if (c.sub_components?.length)
      list.push(...buildNodes(c.sub_components, depth + 1, c.id));
  }
  return list;
}

function byId(id) { return allNodes.find(n => n.id === id); }

function ancestorIds(id) {
  const s = new Set();
  let n = byId(id);
  while (n?.parentId) { s.add(n.parentId); n = byId(n.parentId); }
  return s;
}

function isVisible(node) {
  let pid = node.parentId;
  while (pid) {
    const p = byId(pid);
    if (!p || !p.expanded) return false;
    pid = p.parentId;
  }
  return true;
}

// ─── Filter parsing ───────────────────────────────────────────────────────────
// Supports:  plain text, :material <term>, :geometry <term>
function parseFilter(raw) {
  const m = raw.match(/^:(\w+)\s*(.*)/s);
  if (m) return { field: m[1].toLowerCase(), term: m[2].trim().toLowerCase() };
  return { field: null, term: raw.trim().toLowerCase() };
}

// ─── Visible rows (filter + expansion) ───────────────────────────────────────
function isFiltering() { return parseFilter(search).term.length > 0; }

function visibleNodes() {
  const { field, term } = parseFilter(search);
  if (!term.length) return allNodes.filter(n => isVisible(n));

  // Filter mode: return only direct matches as a flat list (no ancestors)
  return allNodes.filter(n => {
    if (field === 'material') return n.mat.toLowerCase().includes(term);
    if (field === 'geometry') return n.geo.toLowerCase().includes(term);
    return [n.name, n.id, n.mat, n.geo, n.spec, n.desc].some(v => v.toLowerCase().includes(term));
  });
}

function matTag(m) {
  if (!m) return '<span class="nil">—</span>';
  return `<span class="mat-tag" title="${m}">${m}</span>`;
}

// ─── Column drag-reorder ──────────────────────────────────────────────────────
let dragKey  = null;
let dropKey  = null;
let dropSide = null;

function clearDropStyles() {
  document.querySelectorAll('#thead-row th').forEach(t =>
    t.classList.remove('col-dragging', 'drop-before', 'drop-after'));
}

function bindHeaderDrag() {
  document.querySelectorAll('#thead-row th[draggable]').forEach(th => {
    th.addEventListener('dragstart', e => {
      dragKey = th.dataset.key;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragKey);
      // defer so the browser snapshot doesn't already show the faded style
      requestAnimationFrame(() => th.classList.add('col-dragging'));
    });

    th.addEventListener('dragover', e => {
      if (!dragKey || th.dataset.key === dragKey) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const rect = th.getBoundingClientRect();
      const side = e.clientX < rect.left + rect.width / 2 ? 'before' : 'after';
      if (th.dataset.key !== dropKey || side !== dropSide) {
        clearDropStyles();
        document.querySelector(`#thead-row th[data-key="${dragKey}"]`)
                ?.classList.add('col-dragging');
        th.classList.add(`drop-${side}`);
        dropKey  = th.dataset.key;
        dropSide = side;
      }
    });

    th.addEventListener('dragleave', e => {
      // only clear if we've actually left the element (not moved to a child)
      if (!th.contains(e.relatedTarget)) {
        th.classList.remove('drop-before', 'drop-after');
      }
    });

    th.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragKey || dragKey === dropKey || !dropKey) return;
      const srcIdx = COLS.findIndex(c => c.key === dragKey);
      const [col]  = COLS.splice(srcIdx, 1);
      const tgtIdx = COLS.findIndex(c => c.key === dropKey);
      COLS.splice(dropSide === 'after' ? tgtIdx + 1 : tgtIdx, 0, col);
      dragKey = dropKey = dropSide = null;
      saveColConfig();
      render();
    });

    th.addEventListener('dragend', () => {
      clearDropStyles();
      dragKey = dropKey = dropSide = null;
    });
  });
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderHeader() {
  document.getElementById('thead-row').innerHTML =
    COLS.filter(c => c.visible)
        .map(c => `<th class="${c.cls}" draggable="true" data-key="${c.key}">${c.label}</th>`)
        .join('');
  bindHeaderDrag();
}

function renderRows() {
  const rows  = visibleNodes();
  const table = document.getElementById('nav-table');
  const empty = document.getElementById('empty-state');

  if (!rows.length) {
    document.getElementById('tbody').innerHTML = '';
    table.style.display = 'none';
    empty.style.display = '';
    updateStats(0);
    return;
  }
  table.style.display = '';
  empty.style.display = 'none';

  document.getElementById('tbody').innerHTML = rows.map(n => {
    const cells = COLS.filter(c => c.visible).map(col => {
      switch (col.key) {
        case 'name': {
          if (isFiltering()) {
            return `<td class="${col.cls}"><div class="tree-cell">
              <span class="lbl ${n.hasKids ? 'p' : ''}">${n.name}</span>
            </div></td>`;
          }
          const pad = n.depth * 16;
          const btn = n.hasKids
            ? `<span class="xbtn" data-id="${n.id}">${n.expanded ? '&#9660;' : '&#9654;'}</span>`
            : `<span class="xbtn leaf">&#183;</span>`;
          return `<td class="${col.cls}"><div class="tree-cell">
            <span class="indent" style="width:${pad}px"></span>${btn}
            <span class="lbl ${n.hasKids ? 'p' : ''}">${n.name}</span>
          </div></td>`;
        }
        case 'id':   return `<td class="${col.cls}"><span class="id-code">${n.id}</span></td>`;
        case 'qty':  return `<td class="${col.cls}"><span class="qty-pill">${n.qty}</span></td>`;
        case 'mat':  return `<td class="${col.cls}">${matTag(n.mat)}</td>`;
        case 'geo':  return n.geo
          ? `<td class="${col.cls}"><span class="geo-tag">${n.geo}</span></td>`
          : `<td class="${col.cls}"><span class="nil">—</span></td>`;
        case 'spec': return n.spec
          ? `<td class="${col.cls}"><span class="spec-text">${n.spec}</span></td>`
          : `<td class="${col.cls}"><span class="nil">—</span></td>`;
        case 'desc': return `<td class="${col.cls}" title="${n.desc}">${n.desc || '<span class="nil">—</span>'}</td>`;
        default:     return `<td class="${col.cls}"><span class="nil">—</span></td>`;
      }
    }).join('');
    const cls = [n.depth === 0 ? 'asm-root' : '', n.id === selectedId ? 'selected' : ''].filter(Boolean).join(' ');
    return `<tr data-id="${n.id}" class="${cls}">${cells}</tr>`;
  }).join('');

  document.getElementById('tbody').querySelectorAll('.xbtn:not(.leaf)').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const node = byId(btn.dataset.id);
      if (node) { node.expanded = !node.expanded; render(); }
    });
  });

  document.getElementById('tbody').querySelectorAll('tr').forEach(tr => {
    tr.addEventListener('click', () => {
      selectedId = tr.dataset.id === selectedId ? null : tr.dataset.id;
      render();
      document.dispatchEvent(new CustomEvent('asm-select', { detail: { id: selectedId } }));
    });
    tr.addEventListener('mouseenter', () => {
      document.dispatchEvent(new CustomEvent('nav-hover', { detail: { id: tr.dataset.id } }));
    });
    tr.addEventListener('mouseleave', () => {
      document.dispatchEvent(new CustomEvent('nav-hover', { detail: { id: null } }));
    });
  });

  updateStats(rows.length);
}

function updateStats(visible) {
  const total = allNodes.length;
  const top   = allNodes.filter(n => n.depth === 0).length;
  const flt   = search.trim().length > 0;
  document.getElementById('stats-bar').innerHTML = `
    <span><span class="sv">${total}</span> total</span>
    <span><span class="sv">${top}</span> top-level</span>
    <span><span class="sv">${visible}</span> shown</span>
    ${flt ? `<span class="fbadge">Filtered<span class="x" id="clr-flt">✕</span></span>` : ''}
  `;
  document.getElementById('clr-flt')?.addEventListener('click', clearFilters);
}

function render() { renderHeader(); renderRows(); }

// ─── Column config UI ─────────────────────────────────────────────────────────
const COL_STORAGE_KEY = 'asm-nav-cols';

function saveColConfig() {
  const state = COLS.map(c => ({ key: c.key, visible: c.visible }));
  localStorage.setItem(COL_STORAGE_KEY, JSON.stringify(state));
}

function loadColConfig() {
  try {
    const saved = JSON.parse(localStorage.getItem(COL_STORAGE_KEY) || '[]');
    // Restore visibility; also honour saved order
    const ordered = [];
    saved.forEach(s => {
      const col = COLS.find(c => c.key === s.key);
      if (col) { if (!col.locked) col.visible = s.visible; ordered.push(col); }
    });
    // Append any new columns not in saved state
    COLS.forEach(c => { if (!ordered.includes(c)) ordered.push(c); });
    COLS.length = 0; ordered.forEach(c => COLS.push(c));
  } catch (_) {}
}

// renderColConfig removed — replaced by modal

function clearFilters() {
  search = '';
  document.getElementById('inp-search').value = '';
  render();
}

// ─── Panel resize – drag handle ───────────────────────────────────────────────
const panel  = document.getElementById('panel');
const handle = document.getElementById('rhandle');

handle.addEventListener('mousedown', e => {
  e.preventDefault();
  const startX = e.clientX;
  const startW = panel.offsetWidth;
  handle.classList.add('active');

  const onMove = e => {
    const w = Math.max(260, Math.min(window.innerWidth * 0.75, startX - e.clientX + startW));
    // Note: panel is on the LEFT; dragging rightward means startX < e.clientX so w decreases
    // Actually: panel is left, resize handle is on right edge.
    // Dragging right (e.clientX > startX) → panel widens. Use: startW + (e.clientX - startX)
    const newW = Math.max(260, Math.min(window.innerWidth * 0.75, startW - (e.clientX - startX)));
    panel.style.width = newW + 'px';
    panel.style.transition = 'none';
    isWide = newW > (DEFAULT_WIDTH + WIDE_WIDTH) / 2;
    updateWidenIcon();
  };

  const onUp = () => {
    handle.classList.remove('active');
    panel.style.transition = '';
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

// ─── Panel expand/collapse toggle button ──────────────────────────────────────
const widenBtn  = document.getElementById('btn-widen');
const widenIcon = document.getElementById('widen-icon');

function updateWidenIcon() {
  const expanded = panel.offsetWidth > (DEFAULT_WIDTH + WIDE_WIDTH) / 2;
  widenIcon.innerHTML = expanded ? '&laquo;' : '&raquo;';
  widenBtn.classList.toggle('on', expanded);
}

widenBtn.addEventListener('click', () => {
  const currentW = panel.offsetWidth;
  const goWide   = currentW < (DEFAULT_WIDTH + WIDE_WIDTH) / 2;
  panel.style.transition = 'width 0.22s ease';
  panel.style.width      = (goWide ? WIDE_WIDTH : DEFAULT_WIDTH) + 'px';
  isWide = goWide;
  updateWidenIcon();
  // clear transition after animation
  setTimeout(() => { panel.style.transition = ''; }, 240);
});

// ─── Pre-filter dropdown ──────────────────────────────────────────────────────
const pfltBtn   = document.getElementById('btn-pflt');
const pfltPanel = document.getElementById('pflt-panel');
pfltBtn.addEventListener('click', e => {
  e.stopPropagation();
  pfltPanel.classList.toggle('open');
  pfltBtn.classList.toggle('active', pfltPanel.classList.contains('open'));
});
pfltPanel.querySelectorAll('.pflt-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    pfltPanel.classList.remove('open');
    pfltBtn.classList.remove('active');
    setSearch(opt.dataset.prefix);
    inpSearch.focus();
    inpSearch.setSelectionRange(inpSearch.value.length, inpSearch.value.length);
  });
});

// ─── Column chooser modal ────────────────────────────────────────────────────
const colModalBackdrop = document.getElementById('col-modal-backdrop');
let modalChosen = [], modalAvail = [];

function colKey(key) { return COLS.find(c => c.key === key); }

function populateColModal() {
  modalChosen = COLS.filter(c => c.visible  && !c.locked).map(c => c.key);
  modalAvail  = COLS.filter(c => !c.visible && !c.locked).map(c => c.key);
  syncColLists();
}

function syncColLists() {
  const fmt = keys => keys.map(k => `<option value="${k}">${colKey(k).label}</option>`).join('');
  document.getElementById('col-list-chosen').innerHTML = fmt(modalChosen);
  document.getElementById('col-list-avail').innerHTML  = fmt(modalAvail);
}

function selectedVals(selId) {
  return Array.from(document.getElementById(selId).selectedOptions).map(o => o.value);
}

document.getElementById('btn-cols').addEventListener('click', () => {
  populateColModal();
  colModalBackdrop.style.display = 'flex';
});

document.getElementById('col-move-right').addEventListener('click', () => {
  const sel = selectedVals('col-list-chosen');
  modalChosen = modalChosen.filter(k => !sel.includes(k));
  modalAvail  = [...modalAvail, ...sel];
  syncColLists();
});

document.getElementById('col-move-left').addEventListener('click', () => {
  const sel = selectedVals('col-list-avail');
  modalAvail  = modalAvail.filter(k => !sel.includes(k));
  modalChosen = [...modalChosen, ...sel];
  syncColLists();
});

document.getElementById('col-modal-apply').addEventListener('click', () => {
  COLS.forEach(c => { if (!c.locked) c.visible = modalChosen.includes(c.key); });
  // Reorder: locked first, then chosen-in-order, then available
  const locked  = COLS.filter(c => c.locked);
  const chosen  = modalChosen.map(k => colKey(k));
  const avail   = modalAvail.map(k => colKey(k));
  COLS.length = 0;
  [...locked, ...chosen, ...avail].forEach(c => COLS.push(c));
  saveColConfig();
  render();
  colModalBackdrop.style.display = 'none';
});

function closeColModal() { colModalBackdrop.style.display = 'none'; }
document.getElementById('col-modal-cancel').addEventListener('click', closeColModal);
document.getElementById('col-modal-x').addEventListener('click', closeColModal);
colModalBackdrop.addEventListener('click', e => { if (e.target === colModalBackdrop) closeColModal(); });

// Close pre-filter dropdown on outside click
document.addEventListener('click', e => {
  if (!pfltPanel.contains(e.target) && e.target !== pfltBtn) {
    pfltPanel.classList.remove('open');
    pfltBtn.classList.remove('active');
  }
});

// ─── 3D → navigator selection bridge ─────────────────────────────────────────
document.addEventListener('3d-select', e => {
  const incoming = e.detail.id;
  selectedId = incoming === selectedId ? null : incoming;
  // Ensure ancestor nodes are expanded so the selected row is visible
  if (selectedId) {
    ancestorIds(selectedId).forEach(aid => {
      const n = byId(aid);
      if (n) n.expanded = true;
    });
  }
  render();
  document.dispatchEvent(new CustomEvent('asm-select', { detail: { id: selectedId } }));
});

// ─── 3D hover → navigator row highlight ──────────────────────────────────────
document.addEventListener('3d-hover', e => {
  document.querySelectorAll('#tbody tr.hovered').forEach(r => r.classList.remove('hovered'));
  if (e.detail.id) {
    document.querySelector(`#tbody tr[data-id="${e.detail.id}"]`)?.classList.add('hovered');
  }
});

// ─── 3D context menu ─────────────────────────────────────────────────────────
const ctxMenu = document.getElementById('ctx-menu');
let   ctxTargetId = null;

document.addEventListener('3d-contextmenu', e => {
  ctxTargetId = e.detail.id;
  // Keep menu inside viewport
  const menuW = 160, menuH = 36;
  const x = Math.min(e.detail.x, window.innerWidth  - menuW);
  const y = Math.min(e.detail.y, window.innerHeight - menuH);
  ctxMenu.style.left    = x + 'px';
  ctxMenu.style.top     = y + 'px';
  ctxMenu.style.display = 'block';
});

function scrollRowIntoView(id) {
  const wrap = document.querySelector('.table-wrap');
  const row  = document.querySelector(`#tbody tr[data-id="${id}"]`);
  if (!wrap || !row) return;
  const wrapRect = wrap.getBoundingClientRect();
  const rowRect  = row.getBoundingClientRect();
  const rowTop   = rowRect.top  - wrapRect.top  + wrap.scrollTop;
  const rowBot   = rowTop + row.offsetHeight;
  if (rowTop < wrap.scrollTop) {
    wrap.scrollTop = rowTop - 4;
  } else if (rowBot > wrap.scrollTop + wrap.clientHeight) {
    wrap.scrollTop = rowBot - wrap.clientHeight + 4;
  }
}

document.getElementById('ctx-scroll').addEventListener('click', () => {
  ctxMenu.style.display = 'none';
  if (!ctxTargetId) return;
  const id = ctxTargetId;
  ctxTargetId = null;
  selectedId = id;
  ancestorIds(id).forEach(aid => { const n = byId(aid); if (n) n.expanded = true; });
  render();
  document.dispatchEvent(new CustomEvent('asm-select', { detail: { id: selectedId } }));
  requestAnimationFrame(() => scrollRowIntoView(id));
});

// Hide context menu on any click or Escape
document.addEventListener('click',   () => { ctxMenu.style.display = 'none'; });
document.addEventListener('keydown', e => { if (e.key === 'Escape') ctxMenu.style.display = 'none'; });

// ─── Toolbar events ───────────────────────────────────────────────────────────
const inpSearch    = document.getElementById('inp-search');
const btnClearSrch = document.getElementById('btn-clear-search');

function setSearch(val) {
  search = val;
  inpSearch.value = val;
  btnClearSrch.style.display = val ? '' : 'none';
  render();
}

inpSearch.addEventListener('input', e => setSearch(e.target.value));
btnClearSrch.addEventListener('click', () => { setSearch(''); inpSearch.focus(); });
document.getElementById('btn-expand').addEventListener('click',   () => { allNodes.forEach(n => { n.expanded = true; });                render(); });
document.getElementById('btn-collapse').addEventListener('click', () => { allNodes.forEach(n => { if (n.hasKids) n.expanded = false; }); render(); });

// ─── Product header ───────────────────────────────────────────────────────────
function renderProductHeader() {
  const a = ASSEMBLY.assembly;
  document.getElementById('hdr-name').textContent = a.product_name;
  document.getElementById('hdr-chips').innerHTML  =
    `<span class="chip">${a.product_id}</span><span class="chip">v${a.version}</span><span class="chip">${a.units}</span>`;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
const a = ASSEMBLY.assembly;
const componentNodes = buildNodes(a.components);
componentNodes.forEach(n => {
  n.depth += 1;
  if (n.parentId === null) n.parentId = a.product_id;
});
allNodes = [{
  id:      a.product_id,
  name:    a.product_name,
  qty:     1,
  mat:     '',
  geo:     '',
  spec:    `v${a.version}`,
  desc:    a.description,
  depth:   0,
  parentId: null,
  hasKids:  true,
  expanded: true,
}, ...componentNodes];
renderProductHeader();
loadColConfig();
render();
updateWidenIcon();
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Scene ─────────────────────────────────────────────────────────────────────
const canvas   = document.getElementById('canvas-3d');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xefefef);

const camera = new THREE.PerspectiveCamera(40, 1, 1, 2000);
camera.position.set(280, 160, 260);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance   = 80;
controls.maxDistance   = 900;
controls.target.set(0, 0, 0);

// ── Lighting ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const sun = new THREE.DirectionalLight(0xffffff, 0.85);
sun.position.set(200, 300, 200);
scene.add(sun);
const fill = new THREE.DirectionalLight(0xddeeff, 0.3);
fill.position.set(-200, 100, -200);
scene.add(fill);

// ── Grid ──────────────────────────────────────────────────────────────────────
const grid = new THREE.GridHelper(500, 20, 0xbbbbbb, 0xdddddd);
grid.position.y = -53;
scene.add(grid);

// ── Part registry ──────────────────────────────────────────────────────────────
const allMeshes  = [];
const partMeshes = {};

function reg(id, mesh) {
  mesh.userData.partId    = id;
  mesh.userData.baseColor = mesh.material.color.getHex();
  (partMeshes[id] = partMeshes[id] || []).push(mesh);
  allMeshes.push(mesh);
  scene.add(mesh);
}

// ── Coordinate transform ───────────────────────────────────────────────────────
// Assembly: X=Length[0-280], Y=Width[0-120], Z=Height[0-100], center=(140,60,50)
// Three.js: x = ax-140,  y = az-50,  z = 60-ay
function a2t(ax, ay, az) { return [ax - 140, az - 50, 60 - ay]; }

// ── Box primitive (origin = min corner in asm mm; lx/wy/hz = asm dims) ─────────
function box(id, lx, wy, hz, ox, oy, oz, hex) {
  const [tx, ty, tz] = a2t(ox + lx / 2, oy + wy / 2, oz + hz / 2);
  const geo  = new THREE.BoxGeometry(lx, hz, wy);
  const mat  = new THREE.MeshPhongMaterial({ color: hex, shininess: 30, transparent: true, opacity: 0.88 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(tx, ty, tz);
  mesh.add(new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color: 0x777777, transparent: true, opacity: 0.7 })
  ));
  reg(id, mesh);
}

// ── Cylinder (cx/cy/cz = asm center coords) ────────────────────────────────────
// Default: height along THREE Y (= asm Z, vertical)
// axis 'x': rotation.x=PI/2  → height along THREE Z (= asm -Y, front/back)
// axis 'z': rotation.z=PI/2  → height along THREE X (= asm X,  left/right)
function cyl(id, r, h, cx, cy, cz, axis, hex) {
  const [tx, ty, tz] = a2t(cx, cy, cz);
  const geo  = new THREE.CylinderGeometry(r, r, h, 16);
  const mat  = new THREE.MeshPhongMaterial({ color: hex, shininess: 30, transparent: true, opacity: 0.88 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(tx, ty, tz);
  if (axis === 'x') mesh.rotation.x = Math.PI / 2;
  if (axis === 'z') mesh.rotation.z = Math.PI / 2;
  mesh.add(new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color: 0x777777, transparent: true, opacity: 0.7 })
  ));
  reg(id, mesh);
}

// ── Colors ────────────────────────────────────────────────────────────────────
const C = {
  steel:   0xc8c8c8,
  plastic: 0xd4c090,
  heat:    0xcc8855,
  mica:    0xe8dcc8,
  spring:  0x9898a8,
  rubber:  0x484848,
  pcb:     0x60a060,
  copper:  0xaa8844,
};

// ── COMP-001: Outer Housing ────────────────────────────────────────────────────
box('COMP-001-01', 280, 120,   2,   0,   0, 98, C.steel);   // Top Cover

// ── State ─────────────────────────────────────────────────────────────────────
let _selPart = null;
let _hovPart = null;

// ── Highlight (selection + hover combined) ────────────────────────────────────
function matches(pid, id) {
  return id === 'TOASTER-001' || pid === id || pid.startsWith(id + '-');
}

function applyHighlight() {
  const sel = _selPart, hov = _hovPart;
  const anyActive = !!(sel || hov);
  allMeshes.forEach(m => {
    const pid      = m.userData.partId;
    const hovered  = hov && matches(pid, hov);
    const selected = sel && matches(pid, sel);

    let col, opacity, emissive, edgeOpacity, edgeCol;
    if (hovered) {
      col = 0x88bbff; opacity = 1.0;  emissive = 0x001133;
      edgeOpacity = 1.0;  edgeCol = 0x4477cc;
    } else if (selected) {
      col = 0xdd8800; opacity = 1.0;  emissive = 0x221100;
      edgeOpacity = 1.0;  edgeCol = 0x885500;
    } else if (anyActive) {
      col = 0xaaaaaa; opacity = 0.12; emissive = 0x000000;
      edgeOpacity = 0.06; edgeCol = 0x888888;
    } else {
      col = m.userData.baseColor; opacity = 0.88; emissive = 0x000000;
      edgeOpacity = 0.7;  edgeCol = 0x777777;
    }
    m.material.color.setHex(col);
    m.material.opacity = opacity;
    m.material.emissive.setHex(emissive);
    m.children.forEach(c => {
      if (c.isLineSegments) { c.material.opacity = edgeOpacity; c.material.color.setHex(edgeCol); }
    });
  });
}

// ── Event bridges ─────────────────────────────────────────────────────────────
document.addEventListener('asm-select', e => { _selPart = e.detail.id; applyHighlight(); });
document.addEventListener('nav-hover',  e => { _hovPart = e.detail.id; applyHighlight(); });

// ── Raycasting ────────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const pointer   = new THREE.Vector2();

function raycastPart(e) {
  const rect = canvas.getBoundingClientRect();
  pointer.x =  ((e.clientX - rect.left)  / rect.width)  * 2 - 1;
  pointer.y = -((e.clientY - rect.top)   / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(allMeshes, false).filter(h => h.object.isMesh);
  return hits.length ? hits[0].object.userData.partId : null;
}

canvas.addEventListener('click', e => {
  const id = raycastPart(e);
  _selPart = id === _selPart ? null : id;
  document.dispatchEvent(new CustomEvent('3d-select', { detail: { id: _selPart } }));
});

canvas.addEventListener('mousemove', e => {
  const id = raycastPart(e);
  if (id !== _hovPart) {
    _hovPart = id;
    applyHighlight();
    document.dispatchEvent(new CustomEvent('3d-hover', { detail: { id: _hovPart } }));
  }
});

canvas.addEventListener('mouseleave', () => {
  if (_hovPart !== null) {
    _hovPart = null;
    applyHighlight();
    document.dispatchEvent(new CustomEvent('3d-hover', { detail: { id: null } }));
  }
});

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const id = raycastPart(e);
  if (!id) return;
  document.dispatchEvent(new CustomEvent('3d-contextmenu', { detail: { id, x: e.clientX, y: e.clientY } }));
});

// ── Resize ────────────────────────────────────────────────────────────────────
const container = canvas.parentElement;
function resize() {
  const w = container.clientWidth  || 1;
  const h = container.clientHeight || 1;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(container);
resize();

// ── Render loop ───────────────────────────────────────────────────────────────
(function loop() {
  requestAnimationFrame(loop);
  controls.update();
  renderer.render(scene, camera);
})();
</script>
